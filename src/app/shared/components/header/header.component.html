<header class="fixed inset-x-0 top-0 z-50 w-full border-b border-slate-800 bg-black/80 backdrop-blur transition-all duration-300">
  <div class="flex w-full items-center justify-between px-6 py-3 md:px-8">
    <a class="flex items-center gap-2.5 text-xl font-semibold tracking-tight" routerLink="/home" (click)="closeMenu()">
      <img src="assets/image/logos/rm.png" alt="RM Logo" class="h-8 w-auto object-contain rounded-md" />
      <div class="hidden sm:block">
        <span class="font-bold text-white">RicardoMB</span><span class="font-normal text-slate-400">.tech</span>
      </div>
    </a>

    <!-- Desktop Navigation -->
    <nav class="hidden md:flex items-center gap-8 text-sm" aria-label="Navegación principal">
      @for (item of navigation(); track item.id) {
      <a class="text-slate-300 hover:text-white transition-colors" [routerLink]="item.route" routerLinkActive="text-white font-medium">
        {{ item.label }}
      </a>
      }
    </nav>

    <!-- Mobile Menu Button -->
    <button (click)="toggleMenu()" class="flex md:hidden text-white p-2" aria-label="Abrir menú" [attr.aria-expanded]="isMenuOpen()">
      @if (!isMenuOpen()) {
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
      } @else {
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
      }
    </button>
  </div>

  <!-- Mobile Navigation Drawer -->
  <div class="md:hidden overflow-hidden transition-all duration-300 ease-in-out bg-black/95 border-b border-slate-800"
    [ngClass]="isMenuOpen() ? 'max-h-96' : 'max-h-0'">
    <nav class="flex flex-col p-6 gap-4 text-lg">
      @for (item of navigation(); track item.id) {
      <a class="text-slate-300 py-2 border-b border-zinc-900 last:border-0" 
         [routerLink]="item.route" 
         routerLinkActive="text-white font-semibold"
         (click)="closeMenu()">
        {{ item.label }}
      </a>
      }
    </nav>
  </div>
</header>
