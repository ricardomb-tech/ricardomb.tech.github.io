<div class="relative h-full w-full [transform-style:preserve-3d] transition-all duration-700"
  [style.transform]="'rotateY(' + (isFlipped() ? '180deg' : '0deg') + ')'">
  <!-- Front side -->
  <div
    class="absolute inset-0 h-full w-full overflow-hidden rounded-2xl bg-[#0a0a0a] border border-zinc-800/80 shadow-lg transition-all duration-700 group-hover:border-zinc-700"
    [style.backfaceVisibility]="'hidden'" [style.transform]="'rotateY(0deg)'" [style.opacity]="frontOpacity()">
    <div class="relative h-full w-full">
      <!-- Glow central -->
      <div class="absolute inset-0 flex items-start justify-center pt-15">
        <div class="relative flex h-[120px] w-[220px] items-center justify-center">
          @for (circle of circles; track $index) {
          <div class="absolute h-[50px] w-[50px] rounded-[140px] bg-transparent opacity-0"
            [style.boxShadow]="'0 0 50px ' + glowColor()" [style.animation]="'scale 3s linear infinite'"
            [style.animationDelay]="($index * 0.25) + 's'"></div>
          }
        </div>
      </div>

      <!-- Texto inferior -->
      <div class="absolute inset-x-0 bottom-0 p-5">
        <div class="flex items-center justify-between gap-4">
          <div class="space-y-1.5">
            <h3
              class="font-semibold text-lg text-white leading-snug tracking-tighter transition-all duration-500 ease-out-expo group-hover:-translate-y-1">
              {{ title() }}
            </h3>
            <p
              class="line-clamp-2 text-sm text-zinc-400 tracking-tight transition-all delay-[50ms] duration-500 ease-out-expo group-hover:-translate-y-1">
              {{ subtitle() }}
            </p>
          </div>

          <!-- Botón/icono inferior derecho -->
          <button type="button"
            class="group/icon relative inline-flex h-9 w-9 items-center justify-center rounded-xl bg-gradient-to-br from-zinc-700 via-zinc-800 to-zinc-900 text-white border border-zinc-700 transition-transform duration-300 hover:scale-110 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-zinc-400/70">
            <span
              class="relative z-10 text-base leading-none text-black transition-transform duration-300 group-hover/icon:-translate-y-[1px] group-hover/icon:translate-x-[1px]"
              aria-hidden="true">↻</span>
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Back side -->
  <div
    class="absolute inset-0 h-full w-full rounded-2xl p-6 bg-gradient-to-b from-zinc-900 to-[#0a0a0a] border border-zinc-800 flex flex-col transition-all duration-700"
    [style.backfaceVisibility]="'hidden'" [style.transform]="'rotateY(180deg)'" [style.opacity]="backOpacity()">
    <div class="flex-1 space-y-6">
      <div class="space-y-2">
        <h3
          class="font-semibold text-lg text-white leading-snug tracking-tight transition-all duration-500 ease-out-expo group-hover:-translate-y-0.5">
          {{ title() }}
        </h3>
        <p
          class="line-clamp-2 text-sm text-zinc-400 tracking-tight transition-all duration-500 ease-out-expo group-hover:-translate-y-0.5">
          {{ description() }}
        </p>
      </div>

      <div class="space-y-2">
        @for (feature of features(); track feature; let index = $index) {
        <div class="flex items-center gap-2 text-sm text-zinc-300 transition-all duration-500"
          [style.transform]="isFlipped() ? 'translateX(0)' : 'translateX(-10px)'" [style.opacity]="isFlipped() ? 1 : 0"
          [style.transitionDelay]="(index * 100 + 200) + 'ms'">
          <span class="text-zinc-400">→</span>
          <span>{{ feature }}</span>
        </div>
        }
      </div>
    </div>

    <div class="mt-6 border-t border-zinc-800 pt-6">
      <div
        class="group/start relative flex items-center justify-between -m-3 rounded-xl p-3 bg-gradient-to-r from-zinc-800/50 via-zinc-800/30 to-zinc-800/10 transition-all duration-300 hover:scale-[1.02] hover:cursor-pointer">
        <span class="font-medium text-sm text-white transition-colors duration-300 group-hover/start:text-zinc-300">
          Ver más detalles
        </span>
        <div class="group/icon relative">
          <div
            class="absolute inset-[-6px] scale-90 rounded-lg bg-gradient-to-br from-zinc-700/50 via-zinc-700/30 to-transparent opacity-0 transition-all duration-300 group-hover/start:scale-100 group-hover/start:opacity-100">
          </div>
          <span
            class="relative z-10 block h-4 w-4 text-zinc-400 text-base leading-4 text-center transition-all duration-300 group-hover/start:translate-x-0.5 group-hover/start:scale-110">
            →
          </span>
        </div>
      </div>
    </div>
  </div>
</div>
